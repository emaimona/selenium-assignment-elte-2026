apply plugin: 'java'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.testng:testng:7.8.0'
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.18.1'
    testImplementation 'org.slf4j:slf4j-simple:2.0.9'
}

test {
    useTestNG {
        suites 'testng.xml'
    }
    testLogging.showStandardStreams = true
}
